<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Rater</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { text-align: center; font-size: 2rem; color: #ff6b35; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }

    .container { max-width: 600px; margin: 0 auto; }
    .place-list { display: flex; flex-direction: column; gap: 1rem; }

    .place-card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      border: 1px solid #333;
    }

    .place-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .place-name { font-size: 1.05rem; font-weight: 600; }

    .avg-badge { font-size: 0.8rem; color: #aaa; }
    .avg-badge span { color: #ffc107; font-weight: 600; }

    .stars { display: flex; gap: 0.2rem; }

    .star {
      font-size: 1.7rem;
      cursor: pointer;
      transition: transform 0.1s;
      color: #444;
      user-select: none;
      line-height: 1;
    }
    .star:hover { transform: scale(1.15); }
    .star.filled { color: #ffc107; }
    .star.mine { color: #ff9800; }

    .your-rating {
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: #888;
      min-height: 1.1em;
    }

    .empty { text-align: center; color: #555; padding: 3rem 0; font-size: 0.95rem; }

    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .add-form input {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #f0f0f0;
      font-size: 1rem;
    }
    .add-form input::placeholder { color: #666; }
    .add-form input:focus { outline: none; border-color: #ff6b35; }

    .add-form button {
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      border: none;
      background: #ff6b35;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }
    .add-form button:hover { background: #e85a25; }

    .status {
      text-align: center;
      color: #e85a25;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍕 Pizza Rater</h1>
    <p class="subtitle">Rate your local pizza spots</p>
    <p class="status" id="status">Loading…</p>
    <form class="add-form" id="addForm">
      <input type="text" id="placeInput" placeholder="Add a pizza place…" maxlength="60" autocomplete="off" />
      <button type="submit">+</button>
    </form>
    <div class="place-list" id="placeList"></div>
  </div>

  <script>
    const API = SUPABASE_URL.replace(/\/$/, '') + '/rest/v1';
    const HEADERS = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json'
    };

    let voterId = localStorage.getItem('pizza-voter-id');
    if (!voterId) {
      voterId = crypto.randomUUID();
      localStorage.setItem('pizza-voter-id', voterId);
    }

    async function api(path, opts) {
      const res = await fetch(API + path, { headers: HEADERS, ...opts });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.message || body.hint || res.statusText);
      return body;
    }

    let places = [];
    let ratings = [];

    async function load() {
      const statusEl = document.getElementById('status');
      statusEl.style.color = '#888';
      statusEl.textContent = 'Loading…';
      try {
        [places, ratings] = await Promise.all([
          api('/places?select=*'),
          api('/ratings?select=*'),
        ]);
        statusEl.textContent = '';
        render();
      } catch (e) {
        statusEl.style.color = '#e85a25';
        statusEl.textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }

    function render() {
      const list = document.getElementById('placeList');
      list.innerHTML = '';

      if (!places.length) {
        list.innerHTML = '<p class="empty">No pizza places added yet — check back soon!</p>';
        return;
      }

      places.forEach(place => {
        const placeRatings = ratings.filter(r => r.place_id === place.id);
        const myRating = placeRatings.find(r => r.voter_id === voterId);
        const avg = placeRatings.length
          ? (placeRatings.reduce((s, r) => s + r.rating, 0) / placeRatings.length).toFixed(1)
          : null;

        const card = document.createElement('div');
        card.className = 'place-card';

        const header = document.createElement('div');
        header.className = 'place-header';

        const name = document.createElement('span');
        name.className = 'place-name';
        name.textContent = place.name;

        const avgBadge = document.createElement('span');
        avgBadge.className = 'avg-badge';
        avgBadge.innerHTML = avg
          ? `<span>★ ${avg}</span> (${placeRatings.length} rating${placeRatings.length !== 1 ? 's' : ''})`
          : 'No ratings yet';

        header.append(name, avgBadge);

        const stars = document.createElement('div');
        stars.className = 'stars';

        for (let s = 1; s <= 5; s++) {
          const star = document.createElement('span');
          star.className = 'star' + (s <= (myRating?.rating || 0) ? (myRating ? ' mine' : ' filled') : '');
          star.textContent = '★';
          star.title = `Rate ${s} star${s !== 1 ? 's' : ''}`;
          star.addEventListener('click', () => rate(place.id, s));
          stars.appendChild(star);
        }

        const yourRating = document.createElement('p');
        yourRating.className = 'your-rating';
        yourRating.textContent = myRating
          ? `Your rating: ${myRating.rating}/5 — click to change`
          : 'Click to rate';

        card.append(header, stars, yourRating);
        list.appendChild(card);
      });
    }

    async function rate(placeId, rating) {
      try {
        const existing = ratings.find(r => r.place_id === placeId && r.voter_id === voterId);
        if (existing) {
          await api(`/ratings?id=eq.${existing.id}`, {
            method: 'PATCH',
            body: JSON.stringify({ rating }),
          });
          existing.rating = rating;
        } else {
          const [row] = await api('/ratings?select=*', {
            method: 'POST',
            headers: { ...HEADERS, 'Prefer': 'return=representation' },
            body: JSON.stringify({ place_id: placeId, voter_id: voterId, rating }),
          });
          if (row) ratings.push(row);
        }
        render();
      } catch (e) {
        alert('Could not save rating: ' + e.message);
      }
    }

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault();
      const input = document.getElementById('placeInput');
      const name = input.value.trim();
      if (!name) return;
      try {
        const [row] = await api('/places?select=*', {
          method: 'POST',
          headers: { ...HEADERS, 'Prefer': 'return=representation' },
          body: JSON.stringify({ name }),
        });
        if (row) { places.push(row); input.value = ''; render(); }
      } catch (e) {
        alert('Could not add place: ' + e.message);
      }
    });

    load();
  </script>
</body>
</html>
