<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Rater — Admin</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { text-align: center; font-size: 1.8rem; color: #ff6b35; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }

    .container { max-width: 500px; margin: 0 auto; }

    #authSection { display: flex; flex-direction: column; gap: 0.75rem; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #f0f0f0;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: #ff6b35; }

    button {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: none;
      background: #ff6b35;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #e85a25; }
    button.secondary { background: #333; color: #aaa; font-weight: 400; }
    button.secondary:hover { background: #444; }
    button.danger {
      background: transparent;
      border: 1px solid #555;
      color: #888;
      width: auto;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
    }
    button.danger:hover { border-color: #e85a25; color: #e85a25; }

    .error { color: #e85a25; font-size: 0.85rem; text-align: center; min-height: 1.2em; }

    #adminSection { display: none; }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.75rem;
    }

    .add-form { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .add-form input { flex: 1; }
    .add-form button { width: auto; padding: 0.65rem 1.25rem; }

    .place-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .place-row {
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .place-info { flex: 1; }
    .place-row-name { font-weight: 500; }
    .place-row-stats { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }

    .logout { margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍕 Admin</h1>
    <p class="subtitle">Manage pizza places</p>

    <div id="authSection">
      <input type="email" id="email" placeholder="Admin email" autocomplete="email" />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      <p class="error" id="authError"></p>
      <button id="loginBtn">Sign in</button>
    </div>

    <div id="adminSection">
      <p class="section-title">Add a pizza place</p>
      <div class="add-form">
        <input type="text" id="newPlace" placeholder="Pizza place name…" maxlength="60" autocomplete="off" />
        <button id="addBtn">Add</button>
      </div>

      <p class="section-title">Places</p>
      <div class="place-list" id="placeList"></div>
      <p class="error" id="adminError"></p>

      <button class="secondary logout" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <script>
    const BASE = SUPABASE_URL.replace(/\/$/, '');
    const REST = BASE + '/rest/v1';
    const AUTH = BASE + '/auth/v1';

    let accessToken = null;

    function anonHeaders() {
      return {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
      };
    }

    function authHeaders() {
      return {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + accessToken,
        'Content-Type': 'application/json',
      };
    }

    async function req(url, opts = {}) {
      const res = await fetch(url, opts);
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.message || body.error_description || body.hint || res.statusText);
      return body;
    }

    let places = [];
    let ratings = [];

    async function loadData() {
      const [p, r] = await Promise.all([
        req(`${REST}/places?select=*&order=created_at`, { headers: anonHeaders() }),
        req(`${REST}/ratings?select=*`, { headers: anonHeaders() }),
      ]);
      places = p;
      ratings = r;
      renderPlaces();
    }

    function renderPlaces() {
      const list = document.getElementById('placeList');
      list.innerHTML = '';

      if (!places.length) {
        list.innerHTML = '<p style="color:#555;font-size:.9rem">No places yet.</p>';
        return;
      }

      places.forEach(place => {
        const pr = ratings.filter(r => r.place_id === place.id);
        const avg = pr.length
          ? (pr.reduce((s, r) => s + r.rating, 0) / pr.length).toFixed(1)
          : null;

        const row = document.createElement('div');
        row.className = 'place-row';

        const info = document.createElement('div');
        info.className = 'place-info';
        info.innerHTML = `
          <div class="place-row-name">${place.name}</div>
          <div class="place-row-stats">
            ${avg ? `★ ${avg} avg &nbsp;·&nbsp;` : ''}${pr.length} rating${pr.length !== 1 ? 's' : ''}
          </div>`;

        const del = document.createElement('button');
        del.className = 'danger';
        del.textContent = 'Delete';
        del.addEventListener('click', () => deletePlace(place.id));

        row.append(info, del);
        list.appendChild(row);
      });
    }

    async function deletePlace(id) {
      if (!confirm('Delete this place and all its ratings?')) return;
      try {
        await req(`${REST}/places?id=eq.${id}`, { method: 'DELETE', headers: authHeaders() });
        places = places.filter(p => p.id !== id);
        ratings = ratings.filter(r => r.place_id !== id);
        renderPlaces();
      } catch (e) {
        document.getElementById('adminError').textContent = e.message;
      }
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('authError');
      errEl.textContent = '';

      try {
        const data = await req(`${AUTH}/token?grant_type=password`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        accessToken = data.access_token;
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('adminSection').style.display = 'block';
        loadData();
      } catch (e) {
        errEl.textContent = e.message;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      accessToken = null;
      document.getElementById('adminSection').style.display = 'none';
      document.getElementById('authSection').style.display = 'flex';
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
      const name = document.getElementById('newPlace').value.trim();
      const errEl = document.getElementById('adminError');
      errEl.textContent = '';
      if (!name) return;

      try {
        const [row] = await req(`${REST}/places?select=*`, {
          method: 'POST',
          headers: { ...authHeaders(), 'Prefer': 'return=representation' },
          body: JSON.stringify({ name }),
        });
        places.push(row);
        document.getElementById('newPlace').value = '';
        renderPlaces();
      } catch (e) {
        errEl.textContent = e.message;
      }
    });

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
